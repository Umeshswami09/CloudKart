<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudKart Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ff9966,#ff5e62);

}

.container{

width:430px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

text-align:center;

}

h1{

margin-bottom:25px;

color:#ff5e62;

}

input{

width:100%;

padding:15px;

margin:12px 0;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#ff5e62;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#e6494d;

}

a{

text-decoration:none;

font-weight:bold;

color:#ff5e62;

}

</style>

</head>
<body>

<div class="container">

<h1>📝 Create Account</h1>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">
Create Account
</button>

</form>

<br>

<p>

Already have an account?

<a href="{% url 'login' %}">

Login

</a>

</p>

</div>

</body>
</html>
