<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudKart Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#141E30,#243B55);

}

.container{

width:400px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.4);

text-align:center;

}

h1{

margin-bottom:25px;

color:#6f42c1;

}

input{

width:100%;

padding:15px;

margin:12px 0;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#6f42c1;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#5a32a3;

}

a{

text-decoration:none;

color:#6f42c1;

font-weight:bold;

}

.message{

color:red;

margin-bottom:15px;

}

</style>

</head>
<body>

<div class="container">

<h1>🔐 Login</h1>

{% if messages %}
{% for message in messages %}
<p class="message">{{ message }}</p>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<p>
Don't have an account?
<a href="{% url 'register' %}">
Register
</a>
</p>

</div>

</body>
</html>
